name: CI

# Dispara em todo push na main e em todo pull request para a main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  testes:
    name: Build e testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restaurar dependências
        run: dotnet restore tests/PetLovers.UnitTests

      - name: Compilar
        run: dotnet build tests/PetLovers.UnitTests --configuration Release --no-restore

      - name: Rodar os testes
        run: dotnet test tests/PetLovers.UnitTests --configuration Release --no-build --logger "trx;LogFileName=resultados.trx" --results-directory TestResults

      - name: Publicar resultados dos testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resultados-testes
          path: TestResults
