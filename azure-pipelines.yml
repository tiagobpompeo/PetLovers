# Pipeline CI — PetLovers
trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:
  - task: UseDotNet@2
    displayName: 'Instalar .NET 10 SDK'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'

  - script: dotnet restore src/PetLovers.API
    displayName: 'Restore'

  - script: dotnet build src/PetLovers.API --configuration $(buildConfiguration) --no-restore
    displayName: 'Build API'

  - script: dotnet test tests/PetLovers.UnitTests --configuration $(buildConfiguration) --logger trx --results-directory $(Agent.TempDirectory)/tests
    displayName: 'Testes unitários'

  - task: PublishTestResults@2
    displayName: 'Publicar resultados dos testes'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '$(Agent.TempDirectory)/tests/*.trx'

  - script: dotnet publish src/PetLovers.API --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
    displayName: 'Publish API'

  - task: PublishBuildArtifacts@1
    displayName: 'Publicar artefato da API'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/api'
      ArtifactName: 'petlovers-api'

  # O build MAUI (Android/iOS) requer agente macOS e workload maui:
  # - job separado com vmImage 'macos-latest'
  # - dotnet workload install maui
  # - dotnet build src/PetLovers.Mobile -f net10.0-android -c Release
